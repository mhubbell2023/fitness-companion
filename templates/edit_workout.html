
<!DOCTYPE html>
<html>
<head>
    <title>Edit Workout</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Edit Workout</h1>

    <form method="POST">
        <label for="exercise">Exercise:</label>
        <input type="text" id="exercise" name="exercise" value="{{ workout['exercise'] }}" required>
        <br><br>

        <label for="sets">Sets:</label>
        <input type="number" id="sets" name="sets" value="{{ workout['sets'] }}" required>
        <br><br>

        <label for="reps">Reps:</label>
        <input type="number" id="reps" name="reps" value="{{ workout['reps'] }}" required>
        <br><br>

        <label for="weight">Weight:</label>
        <input type="number" step="0.1" id="weight" name="weight" value="{{ workout['weight'] }}" required>
        <br><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" value="{{ workout['date'] }}" required>
        <br><br>

        <button type="submit">Update Workout</button>
    </form>

    <br>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
